# =============================================================================
# nginx.conf — Production RTMP Relay Server + Public HLS Viewer
# =============================================================================
# Target: 720p / 30fps / 2500–3000 kbps relay from OBS to YouTube + Facebook
# Facebook Live is handled by FFmpeg (fb_relay.sh) — RTMPS requires TLS.
# Public viewer available at http://[SERVER_IP]/watch (HLS via port 80)
# =============================================================================

worker_processes auto;          # Use all available CPU cores
worker_rlimit_nofile 65536;     # Increase file descriptor limit for high load

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;                  # Most efficient on Linux
    multi_accept on;
}

# -----------------------------------------------------------------------
# HTTP block — Public viewer (port 80) + Internal stats (port 8080)
# -----------------------------------------------------------------------
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/x-mpegURL video/MP2T;

    # -----------------------------------------------------------------------
    # PUBLIC SERVER — Port 80 — Viewer page + HLS stream delivery
    # -----------------------------------------------------------------------
    # This is what you share as the public URL: http://[SERVER_IP]/watch
    # Open port 80 in firewall: sudo ufw allow 80/tcp
    # -----------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        root /var/www/html;

        # ------------------------------------------------------------------
        # VIEWER PAGE — http://[SERVER_IP]/watch
        # Beautiful player page — share this link with anyone!
        # ------------------------------------------------------------------
        location /watch {
            alias /var/www/html/viewer/;
            index index.html;
            try_files $uri $uri/ /viewer/index.html;
        }

        # ------------------------------------------------------------------
        # HLS STREAM CHUNKS — http://[SERVER_IP]/hls/
        # Browser player fetches .m3u8 playlist and .ts video chunks from here
        # ------------------------------------------------------------------
        location /hls/ {
            alias /var/www/html/hls/;

            # CORS headers — required for HLS.js to fetch chunks cross-origin
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range";

            # HLS content types
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t                   ts;
            }

            # Prevent browser caching of playlist — viewers always get fresh data
            if ($request_filename ~ \.m3u8$) {
                add_header Cache-Control no-cache;
                add_header Access-Control-Allow-Origin *;
            }
        }

        # ------------------------------------------------------------------
        # STREAM STATUS API — http://[SERVER_IP]/api/status
        # Dashboard and viewer page poll this to check if stream is live
        # ------------------------------------------------------------------
        location /api/status {
            default_type application/json;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control no-cache;

            # Check if HLS playlist exists → stream is live
            set $stream_status "offline";
            if (-f /var/www/html/hls/stream/index.m3u8) {
                set $stream_status "live";
            }

            return 200 '{"status":"$stream_status","hls_url":"/hls/stream/index.m3u8","server_time":"$time_iso8601"}';
        }

        # Redirect root to viewer
        location = / {
            return 302 /watch;
        }

        # Block all other access
        location / {
            return 404;
        }
    }

    # -----------------------------------------------------------------------
    # INTERNAL SERVER — Port 8080 — Stats, health, control (localhost only)
    # -----------------------------------------------------------------------
    server {
        listen 8080;
        # ⚠ SECURITY: Restrict to localhost only. Use SSH tunnel if remote access needed.
        allow 127.0.0.1;
        deny  all;

        # RTMP statistics page (real-time stream status)
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /var/www/nginx-rtmp/;
        }

        # Simple health probe endpoint — returns 200 if Nginx is up
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # RTMP control endpoint — allows finishing streams via HTTP
        location /control {
            rtmp_control all;
        }
    }
}

# -----------------------------------------------------------------------
# RTMP block — Core relay configuration
# -----------------------------------------------------------------------
rtmp {
    server {
        listen 1935;              # Standard RTMP port
        chunk_size 4096;          # Performance sweet spot for HD streams
        max_streams 5;            # Safety cap: prevents runaway stream connections
        ack_window 2500000;
        timeout 60s;              # Drop dead connections after 60 seconds of silence

        # Include the RTMP application config from a separate file for clarity
        include /etc/nginx/rtmp.conf;
    }
}
