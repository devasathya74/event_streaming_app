user www-data;
# =============================================================================
# nginx.conf — Production RTMP Relay Server + Public HLS Viewer
# =============================================================================
# FIXES IN THIS VERSION:
#   - Management API (/api/manage/) moved to public port 80 with token auth
#   - /clips/ static file serving added
#   - HLS fragment size reduced to 2s
#   - Better CORS headers for HLS.js
# =============================================================================

# Load dynamic modules (includes libnginx-mod-rtmp on Ubuntu/Kali)
# This MUST come before any rtmp_stat, rtmp_control, or rtmp {} directives.
include /etc/nginx/modules-enabled/*.conf;

worker_processes auto;
worker_rlimit_nofile 65536;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP block
# ─────────────────────────────────────────────────────────────────────────────
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/x-mpegURL video/MP2T;

    # ─────────────────────────────────────────────────────────────────
    # PUBLIC SERVER — Port 80
    # Viewer page + HLS stream + Clips + Management API (token-protected)
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        root /var/www/html;

        # ── Viewer page: http://[SERVER_IP]/watch ─────────────────────
        location /watch {
            alias /var/www/html/watch/;
            index index.html;
            try_files $uri $uri/ /watch/index.html;
        }

        # ── HLS stream chunks: http://[SERVER_IP]/hls/ ────────────────
        location /hls/ {
            alias /var/www/html/hls/;

            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "DNT,Keep-Alive,User-Agent,Cache-Control,Content-Type,Range";

            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t                   ts;
            }

            if ($request_filename ~ \.m3u8$) {
                add_header Cache-Control no-cache;
                add_header Access-Control-Allow-Origin *;
            }
        }

        # ── Clips: http://[SERVER_IP]/clips/ ──────────────────────────
        # AI-generated highlight clips are served statically here
        location /clips/ {
            alias /var/www/html/clips/;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=3600";

            types {
                video/mp4  mp4;
                image/jpeg jpg;
                application/json json;
            }
        }

        # ── Stream Status API: http://[SERVER_IP]/api/status ──────────
        # Used by the public viewer page to check if stream is live
        # NOTE: This is public (no auth) — returns only online/offline
        location /api/status {
            default_type application/json;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control no-cache;

            set $stream_status "offline";
            if (-f /var/www/html/hls/stream/index.m3u8) {
                set $stream_status "live";
            }

            return 200 '{"status":"$stream_status","hls_url":"/hls/stream/index.m3u8","server_time":"$time_iso8601"}';
        }

        # ── Management API: http://[SERVER_IP]/api/manage/ ───────────
        # Dashboard uses this via the PUBLIC port 80 (token authenticated)
        # This proxy reaches the Python server.py running on localhost:3000
        # Token verification is done by server.py itself
        location /api/manage/ {
            proxy_pass         http://127.0.0.1:3000/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-API-Token       $http_x_api_token;
            proxy_read_timeout 30s;

            # CORS preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  *;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type, X-API-Token";
                return 204;
            }
        }

        # Dashboard at root
        location = / {
            return 302 /watch;
        }

        location / {
            return 404;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # INTERNAL SERVER — Port 8080 — Stats, health, control (localhost only)
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 127.0.0.1:8080;

        # RTMP statistics page
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /var/www/nginx-rtmp/;
        }

        # Health probe — returns 200 OK if Nginx is running
        location /health {
            default_type text/plain;
            return 200 "OK\n";
        }

        # RTMP control endpoint
        location /control {
            rtmp_control all;
        }
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# RTMP block
# ─────────────────────────────────────────────────────────────────────────────
rtmp {
    server {
        listen 1936;
        chunk_size 4096;
        max_streams 5;
        ack_window 2500000;
        timeout 60s;

        include /etc/nginx/rtmp.conf;
    }
}
