# =============================================================================
# rtmp.conf — RTMP Application Block + HLS Public Stream Output
# Included by nginx.conf inside the rtmp { server { ... } } block
# =============================================================================
# PLACEHOLDERS — replace before use:
#   [YT_STREAM_KEY]  → Your YouTube Live stream key
#                       (YouTube Studio → Go Live → Stream → Stream Key)
#   [FB_STREAM_KEY]  → Handled by fb_relay.sh, NOT here. See keys/stream_keys.env
# =============================================================================

application live {
    live on;            # Enable live streaming
    record off;         # Disable recording to conserve disk space during events
                        # Set to 'all' and add record_path if you want local DVR

    # ------------------------------------------------------------------
    # Access control — only allow publishing from localhost or OBS IP
    # ------------------------------------------------------------------
    allow publish 127.0.0.1;
    # allow publish 192.168.1.100;  # Uncomment and set your OBS machine LAN IP
    deny publish all;

    # HLS viewers can pull — deny direct RTMP play (use HLS instead)
    deny play all;

    # ------------------------------------------------------------------
    # Push to YouTube Live (RTMP — supported natively)
    # ------------------------------------------------------------------
    push rtmp://a.rtmp.youtube.com/live2/[YT_STREAM_KEY];

    # ------------------------------------------------------------------
    # Push to Facebook Live via local FFmpeg relay
    # ------------------------------------------------------------------
    push rtmp://127.0.0.1:1936/fbsink/stream;

    # ------------------------------------------------------------------
    # HLS OUTPUT — Public Web Viewer (NEW)
    # ------------------------------------------------------------------
    # Nginx splits the RTMP stream into small .ts chunks for web browsers.
    # Viewer URL: http://[SERVER_IP]/watch
    # Anyone with the link can watch live — no YouTube/Facebook account needed!
    hls on;
    hls_path /var/www/html/hls/;        # Directory where chunks are written
    hls_fragment 3s;                    # Each chunk = 3 seconds (low latency balance)
    hls_playlist_length 60s;            # Playlist holds last 60 seconds (20 fragments)
    hls_cleanup on;                     # Auto-delete old chunks when stream ends
    hls_nested on;                      # Store stream in its own subdirectory

    # ------------------------------------------------------------------
    # Notify hooks (optional — uncomment to log stream events)
    # ------------------------------------------------------------------
    # on_publish http://127.0.0.1:8080/control/record/start;
    # on_publish_done http://127.0.0.1:8080/control/record/stop;

    # ------------------------------------------------------------------
    # DVR / Local recording (optional — uncomment to enable)
    # ------------------------------------------------------------------
    # record all;
    # record_path /var/recordings/;
    # record_suffix -%Y%m%d-%H%M%S.flv;
    # record_unique on;
}

# ------------------------------------------------------------------
# Facebook sink application — FFmpeg connects here to pick up the stream
# ------------------------------------------------------------------
application fbsink {
    live on;
    record off;

    allow publish 127.0.0.1;
    allow play   127.0.0.1;
    deny publish all;
    deny play    all;
}
